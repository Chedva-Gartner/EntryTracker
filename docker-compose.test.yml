version: '3.8'

services:
  web:
    image: entrytracker-app:${GITHUB_SHA}
    environment:
      - DB_HOST=mysql
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network

  mysql:
    image: mysql:5.7
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    healthcheck:
       test: ["CMD", "mysqladmin" , "ping", "-h", "localhost"]
       timeout: 3s
       retries: 10
    networks:
      - app_network

networks:
  app_network:

