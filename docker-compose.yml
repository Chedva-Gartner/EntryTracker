version: '3.8'

services:
  web:
    image: entrytracker-app:${IMAGE_TAG}
    container_name: flask-app
    environment:
      - DB_HOST=mysql
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    networks:
      - app_network
    restart: unless-stopped

  mysql:
    image: mysql:5.7
    container_name: mysql-db
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    healthcheck:
    test: ["CMD", "mysqladmin" , "ping", "-h", "localhost"]
    timeout: 3s
    retries: 10
    networks:
      - app_network
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped

networks:
  app_network:

volumes:
  db-data: