name: EntryTracker CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t entrytracker-app:${{ github.sha }} .

      - name: Save image tar
        run: docker save entrytracker-app:${{ github.sha }} -o image.tar
        shell: bash

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: entrytracker-image
          path: image.tar
        if: always()

  unit_test:
    name: unit test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: entrytracker-image
          path: .

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Run container
        run: docker run -d -p 5000:5000 --name entrytracker-manual entrytracker-app:${{ github.sha }}

      - name: Wait for service to start
        run: sleep 5

      - name: Test with curl
        run: curl -f http://localhost:5000

      - name: Stop container
        run: docker stop entrytracker-manual

      - name: Remove container
        run: docker rm entrytracker-manual

  integration_test:
    name: integration test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: entrytracker-image
          path: .

      - name: Load Docker image
        run: docker load -i image.tar

      - name: run docker compose
        run: |
          docker compose -f docker-compose.test.yml up -d --build
      
      - name: Wait for services to start
        run: sleep 10
      
      - name: Test with curl
        run: |
          curl -f http://localhost:5000
      
      - name: Tear down docker compose
        run: |
          docker compose -f docker-compose.test.yml down
  Tagging_push:
    name: Tagging and Push to DockerHub
    runs-on: ubuntu-latest
    needs: [unit_test, integration_test]
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: entrytracker-image
          path: .      
      
      - name: load Docker image 
        run: docker load -i image.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::829876690747:role/GitHubOICDRole
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        
      - name: Tag and Push to ECR
        env:
          ECR_REGISTRY: 829876690747.dkr.ecr.ap-south-1.amazonaws.com
          IMAGE_NAME: entrytracker-app
        run: |
          docker tag entrytracker-app:${{ github.sha }} $ECR_REGISTRY/$IMAGE_NAME:${{ github.sha }}
          docker tag entrytracker-app:${{ github.sha }} $ECR_REGISTRY/$IMAGE_NAME:latest
          docker push $ECR_REGISTRY/$IMAGE_NAME:${{ github.sha }}
          docker push $ECR_REGISTRY/$IMAGE_NAME:latest

  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: Tagging_push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::829876690747:role/GitHubOICDRole
          aws-region: ap-south-1

      - name: connect to instance with ssh and deploy
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/entrytracker-deployment
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 829876690747.dkr.ecr.ap-south-1.amazonaws.com
            docker compose pull
            docker compose up -d 
            docker system prune -f

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.sha }}
          name: Release ${{ github.sha }}
          body: Automated release for commit ${{ github.sha }}
          draft: false
          prerelease: false


