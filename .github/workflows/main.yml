name: EntryTracker CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t entrytracker-app:${{ github.sha }} .

      - name: Save image tar
        run: docker save entrytracker-app:${{ github.sha }} -o image.tar
        shell: bash

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: entrytracker-image
          path: image.tar
        if: always()

  unit_test:
    name: unit test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: entrytracker-image
          path: .

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Run container
        run: docker run -d -p 5000:5000 --name entrytracker-manual entrytracker-app:${{ github.sha }}

      - name: Wait for service to start
        run: |
          timeout 60 bash -c '
          until curl --silent --fail http://localhost:5000 > /dev/null; do
            echo "Waiting for service..."
            sleep 2
          done
          '

      - name: Test with curl
        run: curl -f http://localhost:5000

      - name: Stop container
        run: docker stop entrytracker-manual

      - name: Remove container
        run: docker rm entrytracker-manual

  integration_test:
    name: integration test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: entrytracker-image
          path: .

      - name: Load Docker image
        run: docker load -i image.tar

      - name: run docker compose
        run: |
          docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for services to start
        run: |
          timeout 60 bash -c '
          until curl --silent --fail http://localhost:5000 > /dev/null; do
            echo "Waiting for service..."
            sleep 2
          done
          '

      - name: Test with curl
        run: |
          curl -f http://localhost:5000

      - name: Tear down docker compose
        run: |
          docker compose -f docker-compose.test.yml down

  versioning:
    name: Update Version
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Run version bump script
        run: python bump_version.py

      - name: Commit updated VERSION
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Bump version automatically [skip CI]"
          git push

  Tagging_push:
    name: Tagging and Push to ECR
    runs-on: ubuntu-latest
    needs: [unit_test, integration_test, versioning]
    permissions:
      contents: write
      id-token: write
    outputs:
      image_tag: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: entrytracker-image
          path: .

      - name: load Docker image
        run: docker load -i image.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::829876690747:role/GitHubOICDRole
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get version from VERSION file
        id: get_version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Tag and Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_NAME: entrytracker-app
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          docker tag entrytracker-app:${{ github.sha }} $ECR_REGISTRY/$IMAGE_NAME:$VERSION
          docker tag entrytracker-app:${{ github.sha }} $ECR_REGISTRY/$IMAGE_NAME:latest
          docker push $ECR_REGISTRY/$IMAGE_NAME:$VERSION
          docker push $ECR_REGISTRY/$IMAGE_NAME:latest

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            Automated release for commit ${{ github.sha }}
            Image version: ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false

  update-gitops:
    name: Update GitOps
    runs-on: ubuntu-latest
    needs: Tagging_push
    env:
      IMAGE_TAG: ${{ needs.Tagging_push.outputs.image_tag }}
      APP_NAME: entrytracker
    steps:
      - name: Checkout application repo
        uses: actions/checkout@v4

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: Chedva-Gartner/gitops-entrytracker
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag in values.yaml
        run: |
          cd gitops
          yq -i ".image.tag = \"${IMAGE_TAG}\"" apps/${APP_NAME}/values.yaml

      - name: Commit and push changes
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add apps/${APP_NAME}/values.yaml
          git commit -m "chore(${APP_NAME}): update image tag to ${IMAGE_TAG}"
          git push
